<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UX Persona Audit</title>
<script>
  /* no-flash theme init: runs before paint. Order: #hash > saved choice > system. */
  (function(){var d=document.documentElement,s=null;try{s=localStorage.getItem('ux-theme')}catch(e){}
   var h=location.hash==='#dark'?'dark':location.hash==='#light'?'light':null;
   var sys=(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';
   d.setAttribute('data-theme',h||s||sys);})();
</script>
<style>
  :root{
    /* ── light (default, also no-JS fallback) ── */
    --bg:#f6f7f9; --surface:#ffffff; --surface2:#fbfcfd;
    --ink:#12151a; --body:#454b55; --muted:#767d87; --faint:#aab0b8;
    --line:#e5e7ec; --line2:#d4d8df;
    --accent:#0c7a52; --accent-bri:#0f9c66; --accent-soft:#e7f4ee; --accent-border:#c6e6d6; --quote:#bfe3d1;
    --ok:#0c7a52; --pill-no-bg:#eef0f3;
    --s4:#bf3328; --s4-bg:#fbeae8; --s3:#a4640d; --s3-bg:#fbf1e3; --s2:#7e6c10; --s2-bg:#faf6e1; --s1:#51607a; --s1-bg:#eef1f6;
    --shadow:0 1px 2px rgba(20,30,40,.04), 0 22px 48px -28px rgba(20,40,30,.22);
    --glow-orb:none; --ambient:radial-gradient(46% 34% at 82% -6%, rgba(15,156,102,.10), transparent 64%), radial-gradient(40% 30% at 4% 0%, rgba(15,156,102,.05), transparent 60%);
    --av1-bg:#e7f4ee;--av1-fg:#0c7a52; --av2-bg:#f6efe2;--av2-fg:#a4640d; --av3-bg:#f8ebe9;--av3-fg:#bf3328;
    --av4-bg:#e6f0f0;--av4-fg:#2c7a7a; --av5-bg:#eef0f3;--av5-fg:#5a6470; --av6-bg:#f2ebf1;--av6-fg:#8a5a82;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  :root[data-theme="dark"]{
    --bg:#0a0c10; --surface:#12161d; --surface2:#161b23;
    --ink:#f3f6f9; --body:#a9b2bd; --muted:#79828d; --faint:#525a64;
    --line:#ffffff12; --line2:#ffffff24;
    --accent:#5fe6c8; --accent-bri:#5fe6c8; --accent-soft:rgba(95,230,200,.09); --accent-border:rgba(95,230,200,.22); --quote:#2f7d6d;
    --ok:#6ad98e; --pill-no-bg:rgba(255,255,255,.06);
    --s4:#ff6f6f; --s4-bg:rgba(255,111,111,.1); --s3:#f2a644; --s3-bg:rgba(242,166,68,.1); --s2:#e6cf6a; --s2-bg:rgba(230,207,106,.1); --s1:#aab2c0; --s1-bg:rgba(255,255,255,.06);
    --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 22px 54px -34px rgba(0,0,0,.75);
    --glow-orb:0 0 14px 1px rgba(95,230,200,.7);
    --ambient:radial-gradient(42% 34% at 78% -4%, rgba(95,230,200,.16), transparent 64%), radial-gradient(40% 30% at 6% 2%, rgba(95,230,200,.07), transparent 58%), radial-gradient(80% 60% at 50% 116%, rgba(120,140,255,.05), transparent 60%);
    --av1-bg:#15302a;--av1-fg:#5fe6c8; --av2-bg:#2a2620;--av2-fg:#e0b46a; --av3-bg:#2a2024;--av3-fg:#e09090;
    --av4-bg:#202a2a;--av4-fg:#7fcaca; --av5-bg:#26282e;--av5-fg:#aab2c0; --av6-bg:#2a242a;--av6-fg:#c79bc0;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;transition:background .4s var(--ease),color .4s var(--ease)}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:var(--ambient)}
  strong{font-weight:700;color:var(--ink)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}
  .wrap{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:0 44px 120px}

  .top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:24px 0 0;font-size:.8rem;color:var(--muted)}
  .brand{display:flex;align-items:center;gap:9px;color:var(--ink);font-weight:700;letter-spacing:.01em}
  .brand .orb{width:9px;height:9px;border-radius:50%;background:var(--accent-bri);box-shadow:var(--glow-orb)}
  .top-r{display:flex;align-items:center;gap:14px;min-width:0}
  .top-r .date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top-r .date b{color:var(--body);font-weight:600}
  .tgl{flex:none;display:inline-grid;place-items:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);cursor:pointer;transition:color .25s,border-color .25s,background .25s}
  .tgl:hover{color:var(--ink);border-color:var(--accent-border)}
  .tgl svg{width:16px;height:16px}
  .tgl .ic-sun{display:none} :root[data-theme="dark"] .tgl .ic-sun{display:block} :root[data-theme="dark"] .tgl .ic-moon{display:none}

  .hero{padding:64px 0 34px;max-width:980px}
  .kicker{display:flex;align-items:center;gap:12px;font-size:.82rem;color:var(--muted);margin-bottom:26px;flex-wrap:wrap}
  .kicker .site{color:var(--ink);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:.74rem}
  .kicker .path{font-family:var(--mono);font-size:.78rem;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);padding:3px 9px;border-radius:7px;white-space:nowrap}
  h1{font-size:clamp(2.6rem,5.6vw,4.0rem);font-weight:800;letter-spacing:-.04em;line-height:1.02;margin:0;color:var(--ink);text-wrap:balance;max-width:780px}
  h1 .lead{color:var(--accent);display:block}
  .standfirst{margin:30px 0 0;font-size:1.18rem;color:var(--body);max-width:60ch;line-height:1.6}
  .standfirst strong{color:var(--ink);font-weight:600}

  .cast{margin:48px 0 0;display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface)}
  .person-chip{padding:18px;border-left:1px solid var(--line);transition:background .3s var(--ease)}
  .person-chip:first-child{border-left:none}
  .person-chip:hover{background:var(--surface2)}
  .chip-top{display:flex;align-items:center;justify-content:space-between}
  .mono-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:.96rem}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.ok{background:var(--accent-bri)} .dot.no{background:var(--faint)}
  .chip-name{margin-top:14px;font-weight:700;color:var(--ink);font-size:.98rem}
  .chip-role{font-size:.8rem;color:var(--muted)}

  section{padding-top:88px}
  .slabel{font-size:.8rem;font-weight:700;color:var(--accent);letter-spacing:.02em;margin-bottom:14px}
  h2{font-size:clamp(1.7rem,3.2vw,2.3rem);font-weight:800;letter-spacing:-.025em;color:var(--ink);margin:0 0 30px;line-height:1.08;text-wrap:balance}

  .pattern .row{padding:26px 0;display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:start;border-top:1px solid var(--line)}
  .pattern .row:first-child{border-top:none;padding-top:0}
  .pattern .mk{font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-.02em}
  .pattern p{margin:0;font-size:1.14rem;color:var(--body);line-height:1.55;max-width:72ch}
  .pattern p strong,.pattern p b{color:var(--ink);font-weight:600}

  .entry{display:grid;grid-template-columns:248px 1fr;gap:46px;padding:48px 0;border-top:1px solid var(--line)}
  .entry:first-of-type{border-top:none;padding-top:8px}
  .pf-port{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:1.5rem;margin-bottom:18px}
  .pf-name{font-size:1.55rem;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.05}
  .pf-role{font-size:.92rem;color:var(--muted);margin-top:3px}
  .pf-bio{font-size:.9rem;color:var(--muted);margin-top:14px;line-height:1.5;max-width:30ch}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:.8rem;font-weight:700;padding:6px 12px;border-radius:999px;margin-top:18px}
  .pill.ok{color:var(--accent);background:var(--accent-soft)} .pill.no{color:var(--muted);background:var(--pill-no-bg)}
  .pf-meta{margin-top:20px;display:grid;gap:9px;font-size:.84rem}
  .pf-meta .k{color:var(--faint);min-width:74px} .pf-meta .v{color:var(--body)}
  .pf-meta div{display:flex;gap:8px}

  blockquote{margin:0;font-size:clamp(1.45rem,2.4vw,2.0rem);font-weight:600;line-height:1.3;color:var(--ink);letter-spacing:-.02em;position:relative;text-wrap:pretty;max-width:24ch}
  blockquote::before{content:"\201C";position:absolute;left:-.58em;top:-.16em;font-size:2.6em;line-height:1;color:var(--quote);font-weight:800}
  .attrib{margin:20px 0 0;font-size:.86rem;color:var(--muted)}
  .attrib b{color:var(--body);font-weight:700}
  .help{margin-top:30px;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:10px}
  .analysis{font-size:1.05rem;color:var(--body);line-height:1.62;max-width:64ch;margin:0}
  .analysis + .analysis{margin-top:13px}
  .analysis strong,.analysis b{color:var(--ink);font-weight:600}
  .friction{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:start}
  .friction .ft{font-size:.97rem;color:var(--body);line-height:1.55;max-width:60ch}
  .friction .ft strong,.friction .ft b{color:var(--ink);font-weight:600}

  .sev{font-family:var(--mono);font-size:.76rem;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:8px}
  .sev .sd{width:7px;height:7px;border-radius:50%}
  .sev.s4{color:var(--s4);background:var(--s4-bg)} .sev.s4 .sd{background:var(--s4)}
  .sev.s3{color:var(--s3);background:var(--s3-bg)} .sev.s3 .sd{background:var(--s3)}
  .sev.s2{color:var(--s2);background:var(--s2-bg)} .sev.s2 .sd{background:var(--s2)}
  .sev.s1{color:var(--s1);background:var(--s1-bg)} .sev.s1 .sd{background:var(--s1)}

  .ledger{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
  .lrow{padding:20px 26px;display:grid;grid-template-columns:34px 86px 1fr;gap:20px;align-items:start;border-top:1px solid var(--line)}
  .lrow:first-child{border-top:none}
  .lrow .rank{font-size:1.05rem;font-weight:800;color:var(--faint);line-height:1.5}
  .lrow .sev{margin-top:2px}
  .lrow .what{font-size:1rem;color:var(--ink);line-height:1.5}
  .lrow .what strong,.lrow .what b{font-weight:600}
  .lrow .what .who{color:var(--muted);font-size:.86rem;display:block;margin-top:3px;font-weight:400}

  .exit{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
  .exq{padding:24px 28px;border-top:1px solid var(--line)}
  .exq:first-child{border-top:none}
  .exq-q{margin:0;font-size:1.08rem;font-weight:700;color:var(--ink);line-height:1.4;letter-spacing:-.01em;max-width:60ch}
  .exa{display:grid;grid-template-columns:30px 1fr;gap:13px;align-items:start;padding:14px 0 2px}
  .exa+.exa{border-top:1px solid var(--line);padding-top:14px}
  .mini-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:.78rem;margin-top:1px}
  .exa .ans{margin:0;font-size:.98rem;color:var(--body);line-height:1.55;max-width:66ch}
  .exa .ans .nm{color:var(--ink);font-weight:700;margin-right:8px}
  .exa .ans strong,.exa .ans b{color:var(--ink);font-weight:600}

  .recgroup{margin-bottom:32px}
  .recgroup:last-child{margin-bottom:0}
  .recgroup h3{font-size:.92rem;color:var(--ink);font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .recgroup h3::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--accent-bri)}
  .rec{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:baseline;padding:15px 0;border-bottom:1px solid var(--line);font-size:1.03rem;color:var(--body)}
  .rec:last-child{border-bottom:none}
  .rec strong,.rec b{color:var(--ink);font-weight:600}
  .chips{display:flex;gap:7px;white-space:nowrap}
  .c{font-size:.74rem;font-weight:600;padding:3px 9px;border-radius:7px;border:1px solid var(--line2);color:var(--muted)}
  .c.hi{color:var(--accent);border-color:var(--accent-border);background:var(--accent-soft)}

  footer{margin-top:88px;padding-top:24px;border-top:1px solid var(--line);font-size:.8rem;color:var(--faint);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}

  .empty{position:relative;z-index:1;max-width:560px;margin:140px auto;text-align:center;color:var(--muted);padding:0 24px}
  .empty h2{color:var(--ink);font-weight:800;font-size:1.5rem;letter-spacing:-.02em;margin:0 0 12px}
  .empty code{font-family:var(--mono);font-size:.86em;background:var(--surface);border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--body)}

  .av1{background:var(--av1-bg);color:var(--av1-fg)} .av2{background:var(--av2-bg);color:var(--av2-fg)} .av3{background:var(--av3-bg);color:var(--av3-fg)}
  .av4{background:var(--av4-bg);color:var(--av4-fg)} .av5{background:var(--av5-bg);color:var(--av5-fg)} .av6{background:var(--av6-bg);color:var(--av6-fg)}

  @media screen and (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(14px);animation:rise .7s var(--ease) forwards}
    .cast .person-chip{opacity:0;animation:fade .6s var(--ease) forwards;animation-delay:calc(var(--i)*70ms)}
  }
  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes fade{to{opacity:1}}

  @media (max-width:860px){
    .wrap{padding:0 22px 90px}
    .cast{grid-template-columns:repeat(3,1fr)}
    .person-chip{border-top:1px solid var(--line)}
    .person-chip:nth-child(-n+3){border-top:none}
    .person-chip:nth-child(3n+1){border-left:none}
    .entry{grid-template-columns:1fr;gap:24px}
    .pf-bio,blockquote{max-width:none}
    .lrow{grid-template-columns:30px 1fr;gap:8px 14px}
    .lrow .sev{grid-column:2}
    .exq{padding:20px 18px}
  }
  @media (max-width:460px){ .cast{grid-template-columns:repeat(2,1fr)} .person-chip:nth-child(3n+1){border-left:1px solid var(--line)} .person-chip:nth-child(2n+1){border-left:none} }

  @media print{
    :root,:root[data-theme="dark"]{
      --bg:#fff;--surface:#fff;--surface2:#fff;--ink:#111;--body:#333;--muted:#666;--faint:#999;--line:#ddd;--line2:#ccc;
      --accent:#0c7a52;--accent-bri:#0c7a52;--accent-soft:#eef6f1;--accent-border:#cde7da;--quote:#bfe3d1;--pill-no-bg:#f0f1f3;--shadow:none;--glow-orb:none;--ambient:none;
      --av1-bg:#e7f4ee;--av1-fg:#0c7a52;--av2-bg:#f6efe2;--av2-fg:#a4640d;--av3-bg:#f8ebe9;--av3-fg:#bf3328;--av4-bg:#e6f0f0;--av4-fg:#2c7a7a;--av5-bg:#eef0f3;--av5-fg:#5a6470;--av6-bg:#f2ebf1;--av6-fg:#8a5a82;
    }
    body::before{display:none} .tgl{display:none} section{padding-top:38px}
    .entry,.friction,.ledger,.cast,.exq{break-inside:avoid}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>

<script id="ux-data" type="application/json">{"meta":{"brand":"Linear","descriptor":"issue tracking for product teams","headline":"Six visitors walked Linear's funnel.","headlineLead":"The four engineers signed up. The two non-engineers bounced.","standfirst":"Six prospective users, from a Jira-refugee eng lead to a designer skimming on her phone, walked Linear's real funnel: landing to pricing to signup. **Four signed up, every one of them technical.** The ops lead and the design lead left unsure Linear was even for them, and the four who converted had to dig for the page that actually sold them.","site":"linear.app","date":"17 June 2026","flow":["landing","pricing","signup"],"method":"reasoned"},"ui":{"completed":"Signed up","dropped":"Bounced","personasTitle":"Who got in, and who bounced.","exitTitle":"What the six said after."},"verdict":[{"tag":"The homepage only speaks to engineers","text":"every visual is source code or a pull request and every testimonial is an engineer, so the believer who already lives in that world signs up while **the ops lead and the designer leave unsure there is a seat for them.**"},{"tag":"Your best pages are buried","text":"the Jira-migration story, the security page, and the startup program are each strong enough to close their buyer, yet none sits in the top nav, so **the highest-intent visitors have to hunt for the one page built to convert them.**"},{"tag":"The deciding number is missing","text":"AI-credit pricing is a blank, the startup deal is gated behind an investor, and paid tiers show a monthly figure but bill yearly, so **buyers hit the cost question exactly where the page goes quiet.**"}],"personas":[{"initial":"A","name":"Ada","short":"eng lead","meta":"38, engineering lead for a 12-person team, escaping Jira and allergic to migration pain","outcome":{"completed":true,"landedOn":"Signup (Create your workspace), after digging the Switch page out of the footer"},"chips":[{"k":"From","v":"Google 'jira alternative'"},{"k":"Mindset","v":"Burned by past migrations"},{"k":"Device","v":"Desktop"}],"improvements":["Put **'Switch' / 'Migrate from Jira' in the top nav**, not buried in the footer next to Download. I came from 'jira alternative' and the homepage never once says the word Jira.","Surface the **'Oscar Health migrated 600 engineers from Jira in a month' proof** on the landing page, where a skeptic lands, instead of three pages deep.","State the **real per-seat price honestly**: tiers show a monthly number but say 'billed yearly' with no monthly option, so $10/$16 isn't the true month-to-month cost.","Add **concrete migration mechanics to the Switch page**: 'Jira Sync' is named, but I want to know how issue history and custom fields map, and how long a 12-person move really takes."],"verbatim":"I typed 'jira alternative' into Google and landed on a homepage that's all AI agents and self-driving PRDs, with the word Jira nowhere on it. The migration story exists, it's genuinely good, but I had to scroll to the footer to even find it. That's backwards.","friction":{"severity":"S3","text":"The homepage is pitched entirely at AI-era agent workflows and never names **Jira or 'switch' anywhere visible**; the migration story I came for is hidden in the footer, so a skeptic arriving on 'jira alternative' nearly bounces before finding the one page built to reassure them."},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Once I found the Switch page, mostly yes. Oscar Health moving 600 engineers off Jira in a month, Coinbase and Automattic migrating after decades, '3.3x faster issue resolution', that's exactly the proof a burned skeptic needs, and it names real Jira migrations instead of vague logos. What it didn't earn was trust on the homepage itself, which is so heavy on AI agents I briefly wondered if this was a tracker or an autonomous-coding toy."},{"q":"Could you tell what's free versus what you pay for?","a":"The free tier is clear enough. But the price is muddy: every paid tier shows '$10 per user/month' while also saying 'billed yearly', and I never saw a monthly number. I can read what's gated, but I can't tell my CFO the true per-seat cost without assuming the annual commitment."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"Nearly bounced on the homepage because there's no 'switch from Jira' entry in the top nav. And even on the strong Switch page, the actual migration mechanics are thin: it mentions 'Jira Sync' but doesn't tell me whether my history and custom fields come across cleanly. I'd start a free workspace to poke at it, but I wouldn't move the team until I'd tested an import."}]},{"initial":"T","name":"Tomas","short":"indie hacker","meta":"27, solo dev building a 2-person startup on nights and weekends, allergic to monthly bills","outcome":{"completed":true,"landedOn":"Signup, continuing free with email (no card asked)"},"chips":[{"k":"From","v":"An X thread"},{"k":"Mindset","v":"Impatient, price-shy"},{"k":"Device","v":"Phone"}],"improvements":["Put **'Start free, no card'** on the landing hero. Right now it's all agents, PRDs and enterprise, and nothing tells a 2-person team they can start for $0.","Add a **direct 'Startups' link on the pricing page**, not just the footer, so the 6-months-free program is findable.","State the **partner-only eligibility up top** on the startups page; the '6 months free' headline raised my hopes before the rules killed them.","Surface the **'250 issues plus unlimited archived'** detail on the pricing card; I only found that reassurance buried in the startups FAQ."],"verbatim":"Free plan's actually fine for two of us, but the '6 months free' startup thing turned out to be investor-club only, and I almost didn't even find it.","friction":{"severity":"S3","text":"The Startup Program dangles **'up to 6 months free'** but it's locked behind being affiliated with a Linear partner or investor, which a bootstrapped 2-person team can't get, and the program isn't even linked from the pricing page."},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Half. The free tier looks genuinely usable for two people and there's no card required, so I trust I won't get burned. But the whole site is pitched at big eng teams with AI agents pushing PRs; nothing reflects a 2-person nights-and-weekends build, so it earned my signup more than my loyalty."},{"q":"Could you tell what's free versus what you pay for?","a":"Yes, the cards are clear: Free is $0 with 2 teams and 250 issues, paid starts at $10/user. The one thing that wasn't obvious on pricing was that archived issues don't count toward the 250, I only learned that in the startups FAQ."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"The startup discount. '6 months free' pulled me in, then I read it's partner/investor-only and I'm bootstrapped, so I'm not eligible at all. And I nearly never found that page since pricing doesn't link to it. What saved the commit was the free plan being good enough on its own."}]},{"initial":"H","name":"Hannah","short":"product/ops lead","meta":"35, non-technical product/ops lead whose team mostly doesn't write code; came because a peer said 'we run everything in Linear'","outcome":{"completed":false,"landedOn":"Pricing page, then closed the tab without signing up"},"chips":[{"k":"From","v":"Peer referral"},{"k":"Mindset","v":"Is this for me, or just devs?"},{"k":"Device","v":"Desktop"}],"improvements":["Show one screenshot that isn't code: a roadmap, an intake queue, or a project view a **non-engineer would actually live in**, instead of five .tsx diffs in a row.","Add a plain-language line under the hero naming who it's for beyond engineers (PMs, ops, design), so I can **see myself on the page** instead of guessing.","Gloss the product nav: tell me what **Diffs, Cycles, and Pulse** mean in a phrase each, because right now three of them are meaningless to me.","Include one proof quote from a PM, ops, or design lead, not only **engineers at OpenAI and Ramp**."],"verbatim":"Everything on this page is somebody's code, and every quote is from an engineer. My peer swears by it, but I genuinely can't tell if there's a seat here for the rest of my team or if I'd just be the one non-coder squinting at diffs all day.","friction":{"severity":"S4","text":"The entire homepage speaks to engineers and AI agents: every visual is source code or a PR, every testimonial is from an engineering lead, and nothing tells a **non-technical ops lead this is for them.**"},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Half. It clearly earned trust as a serious, fast, well-built tool, 33,000 teams and quotes from OpenAI and Ramp say that loudly. But it earned that trust for engineers, not for me. Nothing reassured me that my non-technical team would have a place in it, so as 'the tool for MY team', no, it didn't close that gap."},{"q":"Could you tell what's free versus what you pay for?","a":"Mostly, the money was the clearest part. Free is $0, Basic $10, Business $16, Enterprise custom. What I couldn't decode was the feature names next to those prices: Triage Intelligence, Diffs, Pulse, Linear Asks, Cycles. I know the price, I just don't know what half of it does."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"Scrolling the whole homepage and seeing nothing but code, PRs, and diffs, with every testimonial from an engineer. There was no screenshot of a view a non-coder would use and no line saying 'this is for product and ops people too.' I'd have committed if one thing had shown me my non-technical team belongs here."}]},{"initial":"D","name":"Devon","short":"staff engineer","meta":"30, AI-forward staff engineer running a human+agent coding loop (Cursor, Codex, Copilot)","outcome":{"completed":true,"landedOn":"Create your workspace, continued with Google, free workspace started"},"chips":[{"k":"From","v":"Direct (follows on X)"},{"k":"Mindset","v":"Believer, DX-driven"},{"k":"Device","v":"Desktop"}],"improvements":["Put a real number on the **Coding sessions AI credits** right on the pricing table (included allotment plus overage rate), not a bare 'View docs'.","Spell out what **Linear Agent on Free** can actually do; the homepage shows agents pushing PRs but Free only lists 'Linear Agent' with no scope.","Clarify which **agent features are beta vs GA** (Coding Sessions, Code Intelligence, Agent automations are all tagged Beta) so I know what I'm betting my workflow on.","Add a direct **agent / MCP setup link** from the homepage Coding Sessions block so I can verify Cursor/Codex integration before signup."],"verbatim":"The whole pitch is agent-native and I'm sold, but 'Coding sessions, requires AI credits' with just a 'View docs' link tells me nothing about what a day of agent runs actually costs. That's the one number I came here for.","friction":{"severity":"S2","text":"The pricing table's **Coding sessions** line only says it needs AI credits, with a bare 'View docs' link: no price, no included quota, no 'starts at', so I can't tell what an agent-heavy day costs before I commit."},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Yes. 'For teams and agents', Coding Sessions, structural diffs for human and agent output, MCP support, and the Cursor/Codex/Copilot command menu hit my exact workflow, and the OpenAI staff-engineer quote plus 33,000 teams sealed it. The only crack was not knowing the real cost of the AI-credit features."},{"q":"Could you tell what's free versus what you pay for?","a":"Mostly. Free is clear: $0, 2 teams, 250 issues, includes Linear Agent, no card asked. What I couldn't tell is the metered layer, 'Coding sessions' needs AI credits but sits outside the $0/$10/$16/Enterprise tiers with no price attached, so the agent usage I actually care about is a blank."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"Nothing made me leave, I created the workspace. What was missing was a concrete AI-credits price and a clear line on what Linear Agent does on Free versus paid, plus which agent features are still beta. I started free anyway, but I'll judge the actual cost in the docs before I roll it out."}]},{"initial":"Y","name":"Yuki","short":"eng manager","meta":"41, engineering manager at a ~200-person scaleup, risk-averse and security-led, evaluating Linear for procurement","outcome":{"completed":true,"landedOn":"Security page, then pricing to confirm the SSO tier; heading to a sales call"},"chips":[{"k":"From","v":"Peer referral"},{"k":"Mindset","v":"Security due diligence"},{"k":"Device","v":"Desktop"}],"improvements":["Put **Security in the top nav**, not just the footer and a buried enterprise link; a security-led buyer shouldn't have to guess the URL.","State **audit-log retention as a configurable number**; 3 months is a hard fail for SOC 2 evidence, and most of my controls need 12.","Show **data residency as a top-line fact** (EU or US at workspace creation) on the security header, not as the last privacy bullet.","Add a **trust center with the actual reports** behind self-serve NDA; every 'Request SOC 2 / ISO / BAA' is a sales gate that slows procurement."],"verbatim":"The controls are basically all here, SAML, SCIM, SOC 2 Type II, ISO 27001, EU or US hosting, that's a real enterprise checklist. But three months of audit logs is going to get me a no from compliance, and I had to dig into the footer to even find this page.","friction":{"severity":"S3","text":"**Security is missing from the top nav** entirely; it lives only in the footer and one link on the enterprise page, so a security-led buyer has to hunt for the one page that decides the deal."},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Mostly yes, on substance. The security page is genuinely strong: SOC 2 Type II, ISO 27001, GDPR, HIPAA with a BAA, SAML, SCIM, IP restrictions, AES-256 at rest, and a real multi-region answer (EU or US). What dented trust was effort and one spec: I had to hunt for the page, and audit logs only retain 3 months."},{"q":"Could you tell what's free versus what you pay for?","a":"Yes, clearly, and that was the best-structured page. SSO shows Google on every tier but SAML only on Enterprise, and SCIM, IP restrictions, audit log, and HIPAA are all Enterprise. So for my needs the answer is simple: I'm buying Enterprise, annual billing, contact sales."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"Two things. The 3-month audit-log retention could stall this at compliance review, and nothing says it's configurable or exportable to a SIEM. And every compliance artifact is gated behind 'Request', so I can't self-serve the reports to start a vendor assessment without a sales call first. The controls are real, but I won't forward this to procurement until I confirm log retention."}]},{"initial":"L","name":"Lena","short":"design lead","meta":"33, design lead at a small product studio, saw a Linear reel on Instagram and opened it on her phone during a break","outcome":{"completed":false,"landedOn":"Pricing page, bookmarked to revisit on a laptop, didn't sign up"},"chips":[{"k":"From","v":"Instagram reel"},{"k":"Mindset","v":"Curious, time-pressed"},{"k":"Device","v":"Phone"}],"improvements":["Lead with a plain-language line under the hero, like 'Track issues, plan projects, ship faster', so a skimmer **knows what it is in one breath** before the agent stuff.","Show one screenshot of the everyday view (my issues, a board) instead of opening with **code diffs and a PR review** that scream 'this is for engineers'.","Add a short 'who it's for' line, because right now everything says 'teams and agents' and I can't tell if a **design lead like me** belongs here.","On pricing, spell out what 'Agent platform' and AI credits actually cost; the asterisk and the 'requires AI credits' note leave a **hidden-cost feeling**."],"verbatim":"I watched a really pretty reel, opened the site, and thirty seconds in I'm staring at React code and a draft PR. I still couldn't tell you what I'd be doing in here on a Monday morning.","friction":{"severity":"S3","text":"The page talks about 'teams and agents' in the abstract and then shows me **code and PR reviews**, so as a designer I genuinely can't tell what I'd use it for, or whether it's meant for me."},"reflection":[{"q":"Before signing up, did Linear earn your trust as the tool for your team?","a":"Half. The reel was gorgeous and the design here is clearly high-craft, and '33,000 product teams' plus OpenAI and Ramp made it feel serious. But trust that it's the tool for MY team? No. Every quote is from an engineer, every demo is code and PRs. I lead designers; I couldn't see myself or my work anywhere."},{"q":"Could you tell what's free versus what you pay for?","a":"Mostly, the tiers are clean: Free $0 with 2 teams and 250 issues, then $10 and $16 per user. What I couldn't tell is the AI side: 'Agent platform' shows on Free, but 'Coding sessions' has a note that it needs AI credits and nobody says what credits cost. So I know the seat price but I don't trust I know the real bill."},{"q":"What almost made you leave, or what was missing before you'd commit?","a":"The hero. 'The product development system for teams and agents' plus 'Designed for the AI era' is so abstract I had to keep scrolling just to learn it's basically an issue and project tracker, and by then it's all code. I'd bookmark it for my laptop later, but I wouldn't sign up from my phone today."}]}],"briefs":[{"id":"seo","label":"Brief SEO","items":[{"text":"The homepage never says 'issue tracker', 'project management', or 'Jira', it leads with 'the product development system for teams and agents'. That abstraction forfeits the highest-intent search ('jira alternative', 'issue tracker for teams') that brought Ada in.","impact":"High impact","effort":"Half-day"},"Give the Switch (migrate-from-Jira), Security, and Startup Program pages an internal path from the nav and footer; today they convert in isolation with no link from the homepage."]},{"id":"ux","label":"Brief UX","items":[{"text":"Add one plain-language line and one non-code screenshot (a board, roadmap, or intake queue) to the landing, so a non-engineer can see themselves before the code diffs start.","impact":"High impact","effort":"Half-day"},{"text":"Put Switch (migrate from Jira) and Security in the top nav, not the footer; the two pages that close the skeptic and the security buyer are the hardest to find.","impact":"High impact","effort":"~1h"},"Link the Startup Program from the pricing page and state the partner-only eligibility up front; the '6 months free' hook currently raises hopes a bootstrapper can't redeem.",{"text":"Put a real number on Coding sessions / AI credits in the pricing table (included quota plus overage); the metered layer is the cost an agent-heavy buyer actually decides on.","impact":"Revenue","effort":"~1h"},"Show a monthly price or label the per-seat figure clearly; tiers read '$10 per user/month' but bill yearly with no monthly number visible."]},{"id":"nomenclature","label":"Copy & nomenclature","items":["Gloss the product-nav nouns (Intake, Asks, Cycles, Diffs, Pulse) on first use; three of five mean nothing to a newcomer who isn't already a Linear user.","Add a one-sentence 'what Linear is' under the abstract hero; 'product development system for teams and agents' makes a mobile skimmer scroll just to learn it's an issue tracker.","Add one testimonial from a non-engineer (PM, ops, design); all current quotes are from engineering leads, which narrows who feels invited."]},{"id":"bugs","label":"Flags & quick wins","items":[{"text":"Audit-log retention is only 3 months; a security buyer flagged it as a likely compliance fail (most controls need 12). State whether it's configurable or exportable to a SIEM.","impact":"Enterprise","effort":"Verify"},"Every compliance artifact (SOC 2, ISO, BAA) is gated behind a 'Request' sales step; a self-serve trust center would unblock vendor assessments without a sales call.","Coding-sessions AI-credit pricing dead-ends at 'View docs' with no number on the pricing page itself."]}]}</script>
<script>
(function(){
  var DEFAULT_UI={
    completed:"Completed", dropped:"Dropped",
    patternLabel:"The pattern",
    personasLabel:"Person by person", personasTitle:"Where each visitor broke.",
    ledgerLabel:"Friction ledger", ledgerTitle:"Every block, worst first.",
    exitLabel:"Exit interview", exitTitle:"What the panel said after.",
    recsLabel:"Recommendations", recsTitle:"What to fix, in order.",
    help:"What would help",
    methodReasoned:"Reasoned walkthrough", methodClicked:"Click-tested"
  };
  var raw=document.getElementById("ux-data").textContent;
  var DATA=null; try{DATA=JSON.parse(raw);}catch(e){}
  var app=document.getElementById("app");

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function md(s){return esc(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");}
  function capFirst(s){s=String(s==null?"":s);return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
  function sevNorm(s){var n=String(s==null?"":s).toUpperCase().replace(/[^S1-4]/g,"");return /^S[1-4]$/.test(n)?n:"";}
  function sevTag(s){var n=sevNorm(s);if(!n)return "";return '<span class="sev '+n.toLowerCase()+'"><span class="sd"></span>'+n+'</span>';}
  function avc(i){return " av"+((i%6)+1);}
  function initialOf(p){return p.initial||String(p.name||"?").charAt(0);}
  function deriveBrand(site){if(!site)return "";return String(site).replace(/^https?:\/\//,"").split("/")[0].split(".")[0];}

  if(!DATA||!DATA.meta){
    app.innerHTML='<div class="empty"><h2>No report data</h2>'+
      '<p>Build this report with <code>scripts/build_report.mjs &lt;data.json&gt;</code> so the '+
      'data placeholder is replaced with your audit data.</p></div>';
    return;
  }
  var ui=Object.assign({},DEFAULT_UI,DATA.ui||{});
  var m=DATA.meta;
  var personas=Array.isArray(DATA.personas)?DATA.personas:[];

  // ── icons ──
  var MOON='<svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  var SUN='<svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';

  // ── top bar ──
  var dateTxt=(m.site?esc(m.site):'')+(m.site&&m.date?' · ':'')+(m.date?'<b>'+esc(m.date)+'</b>':'');
  var topBar='<div class="top"><div class="brand"><span class="orb"></span>UX Persona Audit</div>'+
    '<div class="top-r"><button class="tgl" id="themeToggle" type="button" aria-label="Toggle light or dark theme">'+MOON+SUN+'</button>'+
    (dateTxt?'<span class="date">'+dateTxt+'</span>':'')+'</div></div>';

  // ── hero ──
  var brand=m.brand||deriveBrand(m.site);
  var pathStr=(m.flow&&m.flow.length)?m.flow.join(" → "):"";
  var kicker='<div class="kicker">'+
    (brand?'<span class="site">'+esc(brand)+'</span>':'')+
    (m.descriptor?'<span>'+esc(m.descriptor)+'</span>':'')+
    (pathStr?'<span class="path">'+esc(pathStr)+'</span>':'')+'</div>';
  var head=m.headline||m.title||"";
  var lead=m.headlineLead||"";
  var h1='<h1>'+esc(head)+(lead?' <span class="lead">'+esc(lead)+'</span>':'')+'</h1>';
  var sf=m.standfirst||m.subtitle||"";
  var hero='<header class="hero">'+kicker+h1+(sf?'<p class="standfirst">'+md(sf)+'</p>':'')+'</header>';

  // ── cast strip ──
  var cast='';
  if(personas.length){
    cast='<div class="cast">'+personas.map(function(p,i){
      var done=p.outcome&&p.outcome.completed===true;
      return '<div class="person-chip" style="--i:'+i+'"><div class="chip-top">'+
        '<span class="mono-av'+avc(i)+'">'+esc(initialOf(p))+'</span>'+
        '<span class="dot '+(done?'ok':'no')+'"></span></div>'+
        '<div class="chip-name">'+esc(p.name)+'</div>'+
        (p.short?'<div class="chip-role">'+esc(p.short)+'</div>':'')+'</div>';
    }).join("")+'</div>';
  }

  // ── the pattern (verdict) ──
  var pattern='';
  if(Array.isArray(DATA.verdict)&&DATA.verdict.length){
    var rows=DATA.verdict.map(function(v,i){
      var n=("0"+(i+1)).slice(-2);
      var body=(v.tag?'<strong>'+esc(v.tag)+'.</strong> ':'')+md(capFirst(v.text||""));
      return '<div class="row"><span class="mk">'+n+'</span><p>'+body+'</p></div>';
    }).join("");
    pattern='<section><div class="slabel reveal">'+esc(ui.patternLabel)+'</div>'+
      '<div class="pattern reveal">'+rows+'</div></section>';
  }

  // ── person by person ──
  var people='';
  if(personas.length){
    var entries=personas.map(function(p,i){
      var outcome="";
      if(p.outcome&&typeof p.outcome.completed==="boolean"){
        outcome='<span class="pill '+(p.outcome.completed?'ok':'no')+'"><span class="dot '+(p.outcome.completed?'ok':'no')+'"></span>'+
          esc(p.outcome.completed?ui.completed:ui.dropped)+'</span>';
      }
      var meta2=(p.chips||[]).map(function(c){
        return '<div><span class="k">'+esc(c.k)+'</span><span class="v">'+esc(c.v)+'</span></div>';
      }).join("");
      var quote=p.verbatim?'<blockquote>'+esc(p.verbatim)+'</blockquote>'+
        '<p class="attrib">&mdash; <b>'+esc(p.name)+'</b>'+(p.short?', '+esc(p.short):'')+'</p>':'';
      var imp=(p.improvements||[]).map(function(t){return '<p class="analysis">'+md(t)+'</p>';}).join("");
      var fr="";
      if(p.friction&&p.friction.text){
        fr='<div class="friction"><div class="ft">'+md(p.friction.text)+'</div>'+sevTag(p.friction.severity)+'</div>';
      }
      return '<div class="entry reveal"><div>'+
        '<div class="pf-port'+avc(i)+'">'+esc(initialOf(p))+'</div>'+
        '<div class="pf-name">'+esc(p.name)+'</div>'+(p.short?'<div class="pf-role">'+esc(p.short)+'</div>':'')+
        (p.meta?'<div class="pf-bio">'+esc(p.meta)+'</div>':'')+outcome+
        (meta2?'<div class="pf-meta">'+meta2+'</div>':'')+
        '</div><div>'+quote+
        '<p class="help">'+esc(ui.help)+' '+esc(p.name)+'</p>'+imp+fr+
        '</div></div>';
    }).join("");
    people='<section><div class="slabel reveal">'+esc(ui.personasLabel)+'</div>'+
      '<h2 class="reveal">'+esc(ui.personasTitle)+'</h2>'+entries+'</section>';
  }

  // ── friction ledger (derived, ranked worst-first) ──
  var ledger='';
  var SEVW={S4:4,S3:3,S2:2,S1:1};
  var fr=personas.map(function(p,i){return {p:p,i:i};})
    .filter(function(x){return x.p.friction&&x.p.friction.text;})
    .sort(function(a,b){
      var wa=SEVW[sevNorm(a.p.friction.severity)]||0, wb=SEVW[sevNorm(b.p.friction.severity)]||0;
      return wb-wa || a.i-b.i;
    });
  if(fr.length){
    var lrows=fr.map(function(x,idx){
      var p=x.p, f=p.friction;
      var who=esc(p.name)+(p.short?' · '+esc(p.short):'');
      return '<div class="lrow"><span class="rank">'+(idx+1)+'</span>'+sevTag(f.severity)+
        '<span class="what">'+md(f.text)+'<span class="who">'+who+'</span></span></div>';
    }).join("");
    ledger='<section><div class="slabel reveal">'+esc(ui.ledgerLabel)+'</div>'+
      '<h2 class="reveal">'+esc(ui.ledgerTitle)+'</h2><div class="ledger reveal">'+lrows+'</div></section>';
  }

  // ── exit interview (post-walkthrough reflections, pivoted by question) ──
  var exit='';
  var withRef=personas.map(function(p,i){return {p:p,i:i};})
    .filter(function(x){return Array.isArray(x.p.reflection)&&x.p.reflection.length;});
  if(withRef.length){
    var maxQ=0; withRef.forEach(function(x){if(x.p.reflection.length>maxQ)maxQ=x.p.reflection.length;});
    var exblocks=[];
    for(var qi=0;qi<maxQ;qi++){
      var qText="";
      for(var k=0;k<withRef.length;k++){var rr=withRef[k].p.reflection[qi];if(rr&&rr.q){qText=rr.q;break;}}
      if(!qText)continue;
      var answers=withRef.map(function(x){
        var r=x.p.reflection[qi];
        if(!r||!r.a)return "";
        return '<div class="exa"><span class="mini-av'+avc(x.i)+'">'+esc(initialOf(x.p))+'</span>'+
          '<p class="ans"><span class="nm">'+esc(x.p.name)+'</span>'+md(r.a)+'</p></div>';
      }).join("");
      if(!answers)continue;
      exblocks.push('<div class="exq"><p class="exq-q">'+esc(qText)+'</p>'+answers+'</div>');
    }
    if(exblocks.length){
      exit='<section><div class="slabel reveal">'+esc(ui.exitLabel)+'</div>'+
        '<h2 class="reveal">'+esc(ui.exitTitle)+'</h2><div class="exit reveal">'+exblocks.join("")+'</div></section>';
    }
  }

  // ── recommendations (briefs) ──
  var recs='';
  if(Array.isArray(DATA.briefs)&&DATA.briefs.length){
    var groups=DATA.briefs.map(function(b){
      var items=(b.items||[]).map(function(it){
        var text=typeof it==="string"?it:(it&&it.text)||"";
        var chips="";
        if(it&&typeof it==="object"){
          if(it.impact) chips+='<span class="c hi">'+esc(it.impact)+'</span>';
          if(it.effort) chips+='<span class="c">'+esc(it.effort)+'</span>';
        }
        return '<div class="rec"><span>'+md(text)+'</span>'+(chips?'<span class="chips">'+chips+'</span>':'')+'</div>';
      }).join("");
      return '<div class="recgroup reveal"><h3>'+esc(b.label)+'</h3>'+items+'</div>';
    }).join("");
    recs='<section><div class="slabel reveal">'+esc(ui.recsLabel)+'</div>'+
      '<h2 class="reveal">'+esc(ui.recsTitle)+'</h2>'+groups+'</section>';
  }

  // ── footer ──
  var methodLabel=m.method?(m.method==="clicked"?ui.methodClicked:ui.methodReasoned):"";
  var footRight=(methodLabel?esc(methodLabel):'')+(methodLabel&&m.site?' · ':'')+(m.site?esc(m.site):'');
  var footer='<footer><span>Generated by the ux-persona-audit skill</span>'+(footRight?'<span>'+footRight+'</span>':'')+'</footer>';

  app.innerHTML='<div class="wrap">'+topBar+hero+cast+pattern+people+exit+ledger+recs+footer+'</div>';

  // ── theme toggle ──
  var btn=document.getElementById("themeToggle");
  if(btn){btn.addEventListener("click",function(){
    var d=document.documentElement;
    var n=d.getAttribute("data-theme")==="dark"?"light":"dark";
    d.setAttribute("data-theme",n);
    try{localStorage.setItem("ux-theme",n)}catch(e){}
  });}
})();
</script>
</body>
</html>
